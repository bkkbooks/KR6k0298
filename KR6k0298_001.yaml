body:
  text: 三下罪相表兩偷蘭遮初註從次註正上併制表偷蘭遮註正上初突吉羅註從四上境想表偷蘭遮註云正上四下罪相標云擇要繁者列表餘釋義皆略五上二地上處同同兩同字旁加圈三乘處同同又又字旁加圈五下二十六處表後標云補入有主物釋自求表上欄標云自求自求五錢得五錢不得求得不得四字旁均加圈自求五錢偷蘭遮註從自求減五錢偷蘭遮註上正自求減五錢突吉羅註從教人表上欄標云教人教人求五錢二俱偷蘭遮註從教人求減五錢二俱偷蘭遮註從六上受教者不得二俱突吉羅註從正受教者多取教者偷蘭遮註云從取異物異處取物七字均加圈無盜心三字加次行無盜心同南山戒本疏科上加圈第四分右上角加圈六下境想表境想二字加圈第一欄偷蘭遮註云從第二欄偷蘭遮註云正上七上開緣二字加圈開緣表後標云補通緣七下案語上加圈案語後標云對閱含註八上罪相二至十相聯十一至十三相聯十五十六相聯十七至二十相聯八下故殺人方便不死偷蘭遮註云從故殺天龍殺死偷蘭遮註正上故殺表下欄註云四分律偷蘭不分應依南山所定三方便分之今此方便不死應是近方便也境想表偷蘭遮註云從九上事鈔九緣註一蘭二蘭三四五相聯三實證無犯四五相聯四增慢無犯五戲笑說吉六說持戒誦經坐禪等本是小妄但虛稱功行即大妄闕緣故結蘭罪七虛說他得自謀名利蘭八九相聯八蘭九蘭十上開緣五六七戲笑至獨處相聯十下開緣前標云附說避免夢失之法側眠開緣一捺奴冒切手重按也十一下戒疏次段言相觸者有三種係引事鈔同字應改標南山行事鈔十五上事鈔六緣四過量不處分量下加點註云二殘五過量下亦加點十五下罪相四罪表未標云已上四罪云云罪相自以繩拼地註拼與𢏳通彈也南山疏作絣十六上開緣一二相聯開緣七佛圖即浮圖塔也講堂即精舍寺院之異名也十六下事鈔長佛六磔手註減此則不須乞十七下罪相自謗比丘比丘尼以無根十三註即受戒時所問十三難案語上標云今據麗藏寫若宋元明有無如見月毗尼止持十八上開緣二三四相聯十九上資持記五法化世註見具緣四依註行人法行四依糞掃衣乞食樹下坐腐爛藥八正註八正聖道正見正思惟等破法輪註九人周界各作眾法註一界內各四人事鈔逮及下篇註云波逸提罪相表自左突吉羅至右僧殘加又標云單白如說戒等羯磨白二一白一羯磨白四一白三羯磨十九下開緣二三相聯註云並據秉法設諫者言開緣五至十相聯五註云以慈濟故開緣十作減損註非理侵犯也作無住處註妄行驅擯也朋黨相謀害故又欄外標註云和尚多己十歲夏阿闍梨多己五歲依止者必十歲同者謂與二師夏次同也一剃髮少許出家二和尚或一人二與授具足戒一出家時為剃髮受十戒或二人二受具戒羯磨五阿闍梨三受具戒教授四受經乃至四句偈五依止乃至依止一宿未滿五夏若和尚命終等別請依止五夏以後若不知法者亦須依止二十下事鈔汙家非戒本緣上五字均加圈謗僧是也一句加圈罪相汙家表一至四註皆謂隨情厚薄令失信心也一俗所惠物二受供所獲三假他勢力但令恃勢意涉私曲不必與物四盜用僧物惡行表一至三註一鄙賤行與人二字加圈二染汙行三輕逸行倡伎即作樂人俳音牌雜戲也謂同俳優浮俗之語走疾走佯跛行跳行跛補火切足偏廢也二十一下開緣二三相聯一至四註同上又註開殘罪五開汙家吉娠音申六以下相聯開惡行罪六供養佛法僧五字加圈資持記十十一註云鈔文併為一條二十二上事鈔五緣成犯一惡性二三相聯拒僧四五相聯違諫二十二下開緣一至四註同上七八九相聯二十四下事鈔靈芝釋律開遙捨註云吉二十八上事鈔知足註云失三受二二十八下開緣三帖障垢處註云以左肩著肉別加布片就裏襯之有膩摘洗則不損衣事鈔價縷註隨一成犯罪相一求價乃至增一錢十六分之一分註印度一大錢當十六小錢二十九上案語初制註云戒註所載又因二事緣起註居士自恣請比丘問須何衣比丘意疑不答佛言應答因增入先不受自恣請一句此第二制也居士欲為作貴價衣比丘欲索不如者不敢言佛言可索三十上事鈔靈芝釋二註云戒文據此位三十一上黑毛臥具戒黑毛註云體貴罪相羺註云小羊羔也三十一下開緣八註障塵垢十二註為襯手三十二上罪相二分黑第三分白第四分尨註云共四分黑註好貴白尨註云惡三十三上不貼坐具戒上標云財先講此土衣重一二三四用法不同披式右肩合披具鉢三十三下罪相故者註縱廣佛一磔手二尺也三十四上事鈔好羊毛註除賤故由旬註相傳大小不同今依行宗記為四十里罪相除羊毛表芻摩註云麻衣又行末註云草葉麻類三十四下開緣五註云毳細毛也事鈔靈芝釋擘註云分析也三十六上事鈔第三行梵志註云婆羅門三十七下事鈔如法鉢註云體色量三十八上事鈔六緣二減五綴綴註株衛切四十下開緣一註云善取開緣二註云不待索開緣八註云因與致難四十一上事鈔口法註須加口法乃得久延作二受註云手受防盜口受延時說淨註云七日限滿即說淨畜說淨為防長不說故染餘但止免長過非為久畜四十一下開緣七日之藥註云酥油生酥蜜石蜜甘蔗糖資持記諸過註云殘宿惡觸非時等既無宿觸註云宿殘宿觸惡觸手已觸之食物為不淨而禁受食之戒第二十七註看講義事鈔二過前求註三月十六日以前求二時中得註三月十六日以後得三過前受註四月一日以前受四過前用註四月一日以前用四十二上開緣三註云雨衣不得餘用捨已故得開緣四註云不用犯吉著故不犯開緣五七八註云開不用吉四十二下戒第二十八註看講義事鈔三過前註云七月六日前四無因緣註云奪失等過後三是十日內註云受罪相受衣表自恣前十日註七月初六日受九日註初七受八日註初八七日註初九六日註初十五日註十一四日註十二三日註十三二日註十四一日註十五衣時標云不說淨之期限自恣後一月五月註後不更增不受迦絺那衣者至八月十五日說淨受衣者至十二月十五日說淨增一日註八月十六日說淨增二日註十七增三日註十八增四日註十九增五日註二十增六日註二十一增七日註二十二增八日註二十三增九日註二十四四十三上事鈔冬分非時註云八月半後彼國八月賊發過七夜註云乃至六夜又註云與第二戒比較四十三下事鈔是通許僧物註云見後第一罪相許異處與異處註云並謂未決定決定者棄又註云南山與上列為四對四十四上事鈔已許僧未許僧已與僧九字皆加又註中謂通明施僧註云未決開緣一二註云開心差三四五註云開不入己六註云開非意四十五上罪相不見二字加點又言不見三字三項皆加點知而妄語註續講表旁一行罪相未語時語時語竟註云律有四句檢閱資持行宗二記罪相說戒突吉羅註但不口言故罪降等事鈔犯無定境與不論外緣句相聯起必依心與內違想心相聯戒疏安苦至樂受註忍苦言樂財色註云五欲所見至所心六段前五各加末段加四十五下事鈔是比丘註云所毀呰註音紫罪相說種類毀呰語註云六品是種隨一品下多種為類面駡註云汝是直說也喻駡註云汝似比他也自比駡註云我非比己也說善法註云假其善事意在毀辱四十六上戒疏屠割註云傷害汝是蘭若如何猶著註云示言相著註云貪離著無學註云極果聖人猶有苦身未免受用瓶衣等物豈況凡夫而能免之彼即假此誹毀善人謂言貪著潛相扇作潛註陰謀扇註興謗資持記師友匠成匠註云磨鍊四十六下開緣標云同殘中破僧戒事鈔隨轉隨脇著地註但令著處即同臥相罪相室有四種表第一至第四種以次分標一二三四第二種前敞無壁障上四字加註三面有障第三種及第四種有壁障均改為四有壁障第三種上雖覆而不遍不遍加註四周有屋中開庭心第四種上雖覆遍而有開處上三字加註少開纔露光耳四十七上開緣三四五相聯六七八相聯九十十一相聯又三至十一復以虛線相聯開緣三有覆二字加四盡覆二字加半障二字加圈五盡覆二字加六盡障二字加七盡障二字加半覆二字加圈七下註云增八盡障二字加四十七下案語覆遍障過半註云二前敞三面有障障周覆過半註云三覆而不遍覆遍障半註云開緣第四障周覆半註云開緣第七案語應遮下加四十八上戒第六下註云為異外道別師資分別言章等事鈔聲聞仙人諸天所說註云為佛印可者齊聲同誦註云約始授言俱利無犯四十八下罪相表句義上標云一說非句義上加與句義一項相聯非句義抄前言註云抄前輒誦文義不辨罪相表句味上標云二說非句味上加與句味一項相聯罪相表字義上標云三說非字義上加與字義一項相聯罪相二欄口授註云同誦書授註己誦他書一說二說三說註云三種不同隨一成犯行宗記諸經偈頌註云此通長行文盡見義開緣一二註云口授書授二並如法四十九下戒疏內實得道註云初果以上五十下事鈔是生地註云能生草木罪相已掘地註看後文漬疾智切久浸也未掘地註天然生地也钁居縛切大鋤也斵音琢擊也椎音追擊物之具鎌音廉掐音恰爪按也橛音厥直一段之木也又作𣏾音弋義同五十一上開緣二曳音以制切牽引也開緣五屎音豕糞也開緣九屋內土註云露處死土壞生種戒壞音怪五十二上開緣八柱與拄通拄音主支也事鈔身口業綺註云身口二業邪曲惱僧喻如文綺五十二下開緣一註開口綺開緣二至七註開身綺二三相聯四五相聯六七相聯二至七又總相聯開緣八註失口非意五十三上戒疏此敬護重註云由是僧差不可輕慢五十三下罪相二欄一行繩牀註張繩之粗椅禪者倚之今且約臥牀也罪相二欄三行䘢音貯敝衣也五十四上罪相去不還者表二行搘音支斜拄也或從木五十四下強敷戒開緣二註云彼許容也開緣三閡音礙開緣四註云彼自召也五十五下罪相在重閣上坐臥隨脇著牀註云戒本通坐廣解唯臥開緣二搘音支柱也開緣四註非薄覆也五十六上罪相清酪漿註乳漿也酢同醋五十九上罪相二行熨音鬱以火斗按平六十三上開緣一大眾集時註云食少人多不開送故沙門施食註將化入道故開受供六十三下資持記瓮註翁去聲瓶也湌同餐六十四上罪相麨註云乾飯屑六十四下罪相末欄四行持食置地註云手不及處五行使淨人註南山分二使淨人作淨人前作律在後別列六十六下開緣三哯註云音衍不嘔而吐也六十七下開緣三罅註虛訝切開緣四上加圈六十九上開緣三上加圈六十九下開緣三上加圈罪相第一欄一二三行相聯註云失囑法七十上開緣六上加圈食家強坐戒上加圈註云食有四種段觸思識今是觸食家眼根對色而受著也事鈔五申手不及戶坐五旁加圈罪相食家中有寶有字旁加圈七十下靈峯事義集要言有寶註多論云以著寶衣輕明發欲故也七十一上事鈔在申手內註云相去八尺內七十一下事鈔緣礙註云破戒等開緣一註云先與後遣開緣二註云先遣後送開緣三註云不與而遣七十二上開緣三上加圈七十三下飲酒戒罪相非酒上加圈七十四上罪相食麴麴註丘六切酒母也罪相若食酒糟上加圈境想表無酒想上加圈開緣一若有病上加圈七十四下資持記酒有十過註云行宗記引智論有三十五過失罪相相澆灒灒音贊灑濺也七十五上開緣二𥱼音牌筏也開緣四上加圈擊攊戒上加圈罪相𨷲同鑰資持記捵他典切手伸物也七十五下罪相一二相聯上加圈七十六上事鈔五緣三四相聯註云三四隨一成犯罪相以色聲香味觸法恐怖人下加圈七十六下開緣二謦音磬欬音慨七十七上罪相一行䴬音弋麥皮也罪相二行被燒半焦三行然炭上加圈七十七下開緣三糜註爛也開緣五溫室註云即浴室藏他衣鉢戒開緣一註云是同心開緣二註云為愛護七十八上開緣三註云為誡敕開緣四註云四己有開緣五註云難開真實淨不語取戒上加圈罪相淨施衣有二種下加圈七十八下罪相重衣輕衣不作淨淨字加圈八十下罪相疑惱表一二三四相聯開緣一為生時為犯註前五懺悔下加八十一上罪相表小食至中夜知四項上加圈罪相自覆藏粗罪上加圈八十二下罪相表駡詈詈註力智切資持記末註此是綜錄戒本疏七滅諍法中文境想表觀註即能斷之人如法滅也八十四上罪相增上意智註意智即心慧也八十五下戒疏二會正註云三乘聖道八十八下罪相自說戒時註云妄語八十九上事鈔不與欲註云此唯斷四諍事不與欲者提餘者吉罪九十下罪相挃音窒九十一上搏比丘戒搏音博九十三上事鈔自作使人註今時坐已成者吉罪相足過八指註一指二寸九十四上罪相刳音枯開緣二鏢𨰭鏢音漂𨰭事鈔作䂎子管切玦音決㺲同鈕杓音標斗柄也𮢏音滑篦事鈔作鎞刀似箭鏃者曰鎞見𣵀槃經資持記鞘註所交切刀室也簦註音登竹也九十四下事鈔五緣二過量量字註長四尺廣三尺緣外廣長各增一尺九十八上著三衣戒開緣三音傳足踵也九十八下反抄衣戒註云肘現體露偏袒右肩得抄左邊通肩披得抄右邊不得令肘現開緣二肋註曆德切脅骨也九十九上資持記媟音薛百上開緣二尻註云考去聲百一上覆身戒第十八註此以正行列為戒本如齊整靜默用意平鉢等其他多標過狀也百五下頰食戒頰吉協切噏飯食戒噏與吸同百六上舌舐食戒舐音士百七上生草上大小便戒註云無隙地者應持乾草葉瓦石等承之水中大小便戒註云若水人所不用或海水不犯四分律比丘戒相表記前經中華書局與開明書店先後印行弘一大師於講授時就印本中隨宜通三訑或改正訛誤僅十一頁下一處或補充解釋此類甚多或加圈表其重要於項目上下或字句旁加圈等或用線示其聯屬於各項或各句間加線聯成一組校註中云相聯者指此茲編為校註以備參考又五頁下自求五錢自求減五錢得減五錢教人求五錢受教者得過五錢六頁上教人求五錢教者有盜心教者無盜心此六項上均加點八頁上事鈔標云後講九頁上開緣後標云補講具緣十頁上開緣後標云講具緣三十頁上資持記標云後講事鈔標云先講三十六頁下罪相金銀若錢註說後釋均未列入校註特附識於此大藏經會謹識
